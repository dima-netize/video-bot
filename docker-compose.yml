services:
  video-bot:
    build: .
    container_name: video-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - ./bot_stats.json:/app/bot_stats.json
      - ./bot_settings.json:/app/bot_settings.json
      - ./bot_subscribers.json:/app/bot_subscribers.json
      - ./cookies.txt:/app/cookies.txt
  control-panel:
    build: .
    container_name: video-bot-panel
    restart: unless-stopped
    command: python admin_site.py
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./downloads:/app/downloads
      - ./bot_stats.json:/app/bot_stats.json
      - ./bot_settings.json:/app/bot_settings.json
      - ./bot_subscribers.json:/app/bot_subscribers.json
